mode: uncertainty_map

data:
  inference_input:
    dir: ../Uncertainty_map/Example_volume
    data_type: .tiff,.tif
    reader_params:
      dimension_order_out: "CZYX"
      T: 0
  inference_output:
    path:  ../Uncertainty_map
  preprocess:
    # #padding for process images of small size
    # - module_name: monai.transforms
    #   func_name: SpatialPad
    #   params:
    #     spatial_size: [0,300,300] 
    #     mode: "constant"
    - module_name: monai.transforms
      func_name: NormalizeIntensity
      params:
        channel_wise: True
  # this will apply slice by slice independent of the volume postpross
  #generate_classmap will extract segmentation for logits 
  postprocess:
    - module_name: mmv_im2im.postprocessing.basic_collection
      func_name: generate_classmap
    # #delete the padding recovering the original size
    # - module_name: monai.transforms
    #   func_name: CenterSpatialCrop
    #   params:
    #     roi_size: [0,800,800]


model:
  framework: ProbUnet
  net:
    module_name: mmv_im2im.models.nets.ProbUnet
    func_name: ProbabilisticUNet
    params:
      in_channels: 1
      n_classes: 2 # 0 background + 2 classes
      latent_dim: 5
      model_type: 2D
    pred_slice2vol:
      uncertainity_map: True  # True : volume segmentation + uncertainity map False : volume segmentation  
      #optiond for volumes postproces (changes not reflectec in the uncertainity map just in the predictions)
      #'pixel_dim' = [1,1,1] pixel dimension taking into account for postprocessing
      n_class_correction: 2
      remove_object_size : [50] #if it's None or not add then its not apply 
      hole_size_threshold: [50] #if it's None or not add then its not apply 
      min_thickness_list: [50] #if it's None or not add then its not apply
      multi_pred_mode: single #pred mode single -> normal way ->max/var/mean -> predic n_samples and take this operation to generate a final prediction
      #options for uncertainty map
      n_samples: 10 #samples taken for uncertainty computing and multipred 
      compute_mode: mutual_inf # type of uncertainty compute variance / mutual_inf / entropy (total epis+model)/prob_inv (1-prob) 
      pertubations: ['gauss_noise','impulse_noise','speckle_noise','color_jitter','shift','rotation','pixel_dropout'] #pertubations included for a pixel Monte Carlo Dropout (MCDO) lis/all(True)  []/False/none/undefine no apply 
      relative_MI: True   # relative/ absolute MI theorical ln(c)
      var_reductor: True  #general uncertainty of False -> per class just in variance case and multi class
      trunc: 4 # Number of digits to take into accoun after the float point for the uncertainity_map (trunc = 4 -> 0.xxxx) deafult 4 if you want keep the whole float representation set as False
      threshold: 0.68 # threshold for the uncertainty map  Uncer_map < threshold = 0  (turn 0 every value under de threshold)  None/undefined/False  don't apply  
      border_correction: [2,1] # Number of pixels [x,y] -> [top/dowm,left/right] to take into acount in the border correction.
      estabilizer: True # If sets true and compute values are in order of e^{-10} will apply sqrt to put in range of 0.0x 
  checkpoint:  ../Uncertainty_map/pretrain/weights.ckpt
  model_extra:
    cpu_only: False
trainer:
  verbose: True
  params:
    gpus: 1
    precision: 32
